<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid / tech pattern -->
  <g opacity="0.08" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
  </g>

  <!-- Four expert nodes -->
  <g>
    <!-- Architect (blue) -->
    <circle cx="180" cy="140" r="32" fill="#58a6ff" opacity="0.9"/>
    <text x="180" y="146" text-anchor="middle" fill="#0d1117" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">A</text>

    <!-- Reviewer (green) -->
    <circle cx="290" cy="140" r="32" fill="#3fb950" opacity="0.9"/>
    <text x="290" y="146" text-anchor="middle" fill="#0d1117" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">R</text>

    <!-- Security (red/orange) -->
    <circle cx="400" cy="140" r="32" fill="#f85149" opacity="0.9"/>
    <text x="400" y="146" text-anchor="middle" fill="#0d1117" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">S</text>

    <!-- Python (yellow) -->
    <circle cx="510" cy="140" r="32" fill="#d29922" opacity="0.9"/>
    <text x="510" y="146" text-anchor="middle" fill="#0d1117" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">P</text>
  </g>

  <!-- Connecting lines -->
  <g stroke="#58a6ff" stroke-width="2" opacity="0.35">
    <line x1="212" y1="140" x2="258" y2="140"/>
    <line x1="322" y1="140" x2="368" y2="140"/>
    <line x1="432" y1="140" x2="478" y2="140"/>
  </g>

  <!-- Main Title -->
  <text x="620" y="115" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="52" font-weight="700" fill="#f0f6fc" letter-spacing="-1">Expert Advisor</text>

  <!-- Subtitle -->
  <text x="620" y="155" font-family="system-ui, -apple-system, sans-serif" 
        font-size="26" fill="#8b949e">Lean • 4 Experts • MCP Server</text>

  <!-- Tagline -->
  <text x="620" y="195" font-family="system-ui, -apple-system, sans-serif" 
        font-size="18" fill="#7d8590">Multi-LLM • Parallel • No Bloat</text>

  <!-- Right side accent -->
  <rect x="1050" y="80" width="6" height="120" rx="3" fill="url(#accent)"/>
</svg>